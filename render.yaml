services:
  - type: web
    name: jazz-feedback-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Apertus (HuggingFace Router API). Wert im Render-Dashboard setzen.
      - key: HF_TOKEN
        sync: false
